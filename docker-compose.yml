# CodingKitty local development services.
# Start everything with:  docker compose up -d
# Stop with:              docker compose down
# Reset the database:     docker compose down -v   (deletes the data volume)
services:
  db:
    build: ./docker/postgres
    container_name: codingkitty-db
    restart: unless-stopped
    environment:
      # These must match DATABASE_URL in packages/server/.env
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: codingkitty
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5433:5432"
    volumes:
      - codingkitty_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d codingkitty"]
      interval: 5s
      timeout: 5s
      retries: 10

  temporal:
    image: temporalio/auto-setup:latest
    container_name: codingkitty-temporal
    restart: unless-stopped
    ports:
      - "7233:7233"    # gRPC frontend
      - "8233:8233"    # Web UI
    environment:
      - DB=postgres12
      # Bind all interfaces so the in-container healthcheck (127.0.0.1:7233) and
      # the host port mapping both reach the frontend (auto-setup otherwise binds
      # only the container's eth0 IP, leaving the container stuck "unhealthy").
      - BIND_ON_IP=0.0.0.0
      - DB_PORT=5432
      - POSTGRES_USER=postgres
      - POSTGRES_PWD=postgres
      - POSTGRES_SEEDS=db
      - DYNAMIC_CONFIG_FILE_PATH=config/dynamicconfig/docker.yaml
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "temporal", "workflow", "list", "--namespace", "default"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: codingkitty-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: codingkitty-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Console UI
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - codingkitty_minio:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  inference:
    build: ./packages/inference
    container_name: codingkitty-inference
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      # Persist downloaded model weights (MegaDescriptor ~110MB) across restarts.
      - codingkitty_modelcache:/cache
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 120s

volumes:
  codingkitty_pgdata:
  codingkitty_minio:
  codingkitty_modelcache:
